<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Terminal tile in Dracula bg with a faint purple edge -->
  <rect width="64" height="64" rx="14" fill="#282a36" />
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#bd93f9" stroke-opacity="0.5" stroke-width="2" />
  <!-- ST monogram in the brand purple -->
  <text x="32" y="38" text-anchor="middle"
    font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace"
    font-size="30" font-weight="700" letter-spacing="-1" fill="#cbabfb">ST</text>
  <!-- Terminal cursor underscore — the tech beat, in Dracula green -->
  <rect x="21" y="45" width="22" height="3.5" rx="1.75" fill="#50fa7b" />
</svg>
